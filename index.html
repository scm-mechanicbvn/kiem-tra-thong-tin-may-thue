<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quét QR - Tra cứu Mã máy</title>
  <style>
    :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; color:#111}
    body{margin:0;padding:18px;background:#f7f8fb}
    .topbar{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    button{background:#0b79ff;color:#fff;border:0;padding:8px 12px;border-radius:6px;cursor:pointer;font-weight:600}
    button.secondary{background:#6b7280}
    .count{font-size:14px;color:#111;font-weight:600}
    .meta{font-size:13px;color:#4b5563;margin-bottom:12px}
    .hint{font-size:13px;color:#6b7280;margin-top:8px}
    .scanner-wrap{display:none;margin:12px 0;position:relative}
    video#qr-video{width:100%;max-width:640px;border-radius:8px;background:#000}
    .close-scan{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.5);color:#fff;border-radius:6px;padding:6px 8px;border:0}
    .result{margin-top:14px}
    .not-found{color:#b91c1c;font-weight:700}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,0.06)}
    th,td{padding:10px 12px;border-bottom:1px solid #eef2f7;text-align:left;font-size:14px}
    th{background:#f1f5f9;color:#0f172a;font-weight:700}
    tr:last-child td{border-bottom:0}
    .small{font-size:13px;color:#475569}
    .center{display:flex;align-items:center;gap:8px}
    .loader{width:14px;height:14px;border:2px solid #cbd5e1;border-top-color:#0b79ff;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer-hint{margin-top:10px;color:#475569;font-size:13px}
    details pre{background:#f8fafc;padding:8px;border-radius:6px}
  </style>
</head>
<body>
  <div class="topbar">
    <button id="refreshBtn">Làm mới</button>
    <div class="count">Đã đọc: <span id="count">0</span></div>
    <div style="margin-left:auto" class="center">
      <div id="loadingIndicator" style="display:none" class="loader" aria-hidden="true"></div>
      <button id="scanBtn" class="secondary">Quét QR</button>
    </div>
  </div>

  <div class="meta">
    <span class="small">Cập nhật lần cuối: <strong id="lastUpdated">—</strong></span>
  </div>

  <div class="scanner-wrap" id="scannerWrap">
    <button id="closeScan" class="close-scan">Đóng</button>
    <video id="qr-video"></video>
  </div>

  <div class="result">
    <div id="lookupResult" class="small"></div>
    <div id="tableContainer" style="margin-top:10px"></div>
  </div>

  <div class="footer-hint">
    Dữ liệu được lưu vào <strong>Local Storage</strong>. Nếu mã không tồn tại, hãy thử bấm "Làm mới" để cập nhật dữ liệu.
  </div>

  <script type="module">
    import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner/qr-scanner.min.js";

    const API_URL = 'https://script.google.com/macros/s/AKfycbw-r2b6lEyZvygRzjOQlQOr9zS53p2EsV7M4GrQ2-reh6v14xl8L5s2zrMnhSyK3ZnX/exec';

    const refreshBtn = document.getElementById('refreshBtn');
    const scanBtn = document.getElementById('scanBtn');
    const countEl = document.getElementById('count');
    const lastUpdatedEl = document.getElementById('lastUpdated');
    const scannerWrap = document.getElementById('scannerWrap');
    const qrVideo = document.getElementById('qr-video');
    const closeScan = document.getElementById('closeScan');
    const lookupResult = document.getElementById('lookupResult');
    const tableContainer = document.getElementById('tableContainer');
    const loadingIndicator = document.getElementById('loadingIndicator');

    const LS_KEY_DATA = 'qr_device_data_v1';
    const LS_KEY_TS = 'qr_device_data_ts_v1';

    let deviceData = {};
    let qrScanner = null;
    let normalizedIndex = {}; // map normalizedKey -> originalKey

    function formatTS(ts) {
      try {
        const d = new Date(Number(ts));
        if (isNaN(d)) return '—';
        return d.toLocaleString('vi-VN', { hour12: false });
      } catch (e) { return '—'; }
    }

    function loadFromLocal() {
      try {
        const raw = localStorage.getItem(LS_KEY_DATA);
        const ts = localStorage.getItem(LS_KEY_TS);
        if (raw) {
          deviceData = JSON.parse(raw) || {};
          buildNormalizedIndex();
          countEl.textContent = Object.keys(deviceData).length;
        } else {
          deviceData = {};
          countEl.textContent = 0;
        }
        lastUpdatedEl.textContent = ts ? formatTS(Number(ts)) : '—';
      } catch (e) {
        console.error('Load local error', e);
        deviceData = {};
        countEl.textContent = 0;
        lastUpdatedEl.textContent = '—';
      }
    }

    function saveToLocal(dataObj) {
      try {
        localStorage.setItem(LS_KEY_DATA, JSON.stringify(dataObj));
        localStorage.setItem(LS_KEY_TS, String(Date.now()));
        lastUpdatedEl.textContent = formatTS(Date.now());
      } catch (e) {
        console.error('Save local error', e);
      }
    }

    async function parseResponseText(text) {
      text = text.trim();
      if (text.startsWith('{') || text.startsWith('[')) {
        return JSON.parse(text);
      }
      const m = text.match(/^[\w$]+\s*\(\s*([\s\S]+)\s*\)\s*;?$/);
      if (m && m[1]) {
        return JSON.parse(m[1]);
      }
      const firstBrace = text.indexOf('{');
      const lastBrace = text.lastIndexOf('}');
      if (firstBrace >= 0 && lastBrace > firstBrace) {
        const sub = text.slice(firstBrace, lastBrace + 1);
        return JSON.parse(sub);
      }
      throw new Error('Không thể phân tích phản hồi từ server');
    }

    async function refreshData() {
      loadingIndicator.style.display = 'inline-block';
      refreshBtn.disabled = true;
      lookupResult.textContent = '';
      try {
        const url = API_URL + '?nocache=' + Date.now();
        const resp = await fetch(url, { cache: 'no-store' });
        const text = await resp.text();
        const parsed = await parseResponseText(text);

        // Remove meta if present
        const dataObj = Object.assign({}, parsed);
        if (dataObj.meta) delete dataObj.meta;

        // Normalize keys to strings
        const normalized = {};
        for (const k of Object.keys(dataObj)) {
          if (k === 'meta') continue;
          normalized[String(k)] = dataObj[k];
        }

        deviceData = normalized;
        buildNormalizedIndex();
        saveToLocal(deviceData);
        countEl.textContent = Object.keys(deviceData).length;
        lookupResult.textContent = 'Đã cập nhật dữ liệu.';
        tableContainer.innerHTML = '';
      } catch (err) {
        console.error(err);
        lookupResult.innerHTML = '<span class="not-found">Lỗi khi tải dữ liệu. Hãy thử lại.</span>';
      } finally {
        loadingIndicator.style.display = 'none';
        refreshBtn.disabled = false;
      }
    }

    function buildNormalizedIndex() {
      normalizedIndex = {};
      for (const k of Object.keys(deviceData)) {
        const n = normalizeKey(k);
        if (n) normalizedIndex[n] = k;
      }
    }

    function renderDeviceTable(deviceKey, deviceObj) {
      if (!deviceObj) {
        tableContainer.innerHTML = `<div class="not-found">Mã <strong>${escapeHtml(deviceKey)}</strong> không tồn tại trong dữ liệu. Hãy thử bấm "Làm mới".</div>`;
        return;
      }

      const fields = deviceObj.fields || deviceObj;
      let rowsHtml = '';

      // If fields is an object with header names, preserve order by keys in fields
      if (deviceObj.fields && typeof deviceObj.fields === 'object' && !Array.isArray(deviceObj.fields)) {
        for (const key of Object.keys(fields)) {
          rowsHtml += `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(String(fields[key] === null || fields[key] === undefined ? '' : fields[key]))}</td></tr>`;
        }
      } else if (deviceObj.cellMap && typeof deviceObj.cellMap === 'object') {
        // Prefer cellMap order A..H
        const letters = Object.keys(deviceObj.cellMap).sort((a,b) => columnLetterToNumber(a) - columnLetterToNumber(b));
        for (const letter of letters) {
          rowsHtml += `<tr><th>${escapeHtml(letter)}</th><td>${escapeHtml(String(deviceObj.cellMap[letter] === null || deviceObj.cellMap[letter] === undefined ? '' : deviceObj.cellMap[letter]))}</td></tr>`;
        }
        // Also include other top-level fields
        for (const k of Object.keys(deviceObj)) {
          if (['cellMap','fields','row','colStart','colEnd'].includes(k)) continue;
          rowsHtml += `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(String(deviceObj[k] === null || deviceObj[k] === undefined ? '' : deviceObj[k]))}</td></tr>`;
        }
      } else {
        for (const key of Object.keys(deviceObj)) {
          rowsHtml += `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(String(deviceObj[key] === null || deviceObj[key] === undefined ? '' : deviceObj[key]))}</td></tr>`;
        }
      }

      tableContainer.innerHTML = `
        <table aria-live="polite">
          <thead><tr><th>Trường</th><th>Giá trị</th></tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      `;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function columnLetterToNumber(letter) {
      let num = 0;
      for (let i = 0; i < letter.length; i++) {
        num = num * 26 + (letter.charCodeAt(i) - 64);
      }
      return num;
    }

    async function startScanner() {
      lookupResult.textContent = '';
      tableContainer.innerHTML = '';
      scannerWrap.style.display = 'block';
      scanBtn.disabled = true;
      refreshBtn.disabled = true;

      if (qrScanner) {
        try { qrScanner.stop(); } catch (e) {}
        qrScanner = null;
      }

      qrScanner = new QrScanner(qrVideo, result => {
        handleScannedCode(result);
      }, {
        highlightScanRegion: true,
        returnDetailedScanResult: false
      });

      try {
        await qrScanner.start();
      } catch (e) {
        console.error('Camera start error', e);
        lookupResult.innerHTML = '<span class="not-found">Không thể truy cập camera. Kiểm tra quyền trình duyệt.</span>';
        stopScanner();
      }
    }

    function stopScanner() {
      if (qrScanner) {
        try { qrScanner.stop(); } catch (e) {}
        try { qrScanner.destroy(); } catch (e) {}
        qrScanner = null;
      }
      scannerWrap.style.display = 'none';
      scanBtn.disabled = false;
      refreshBtn.disabled = false;
    }

    function decodeURIComponentSafe(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }

    function normalizeKey(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .trim()
        .toLowerCase()
        .replace(/đ/g, 'd')
        .replace(/\s+/g, '')
        .replace(/[^a-z0-9]/g, '');
    }

    function tryExtractCodeFromObject(obj) {
      if (!obj || typeof obj !== 'object') return null;
      const candidates = ['data','text','code','id','ma','ma_may','mã','mã_máy','device','deviceId','device_id'];
      for (const k of candidates) {
        if (k in obj && obj[k]) return String(obj[k]);
      }
      // If object has nested simple structure like {code: "..."} or {data:{code:"..."}}
      for (const k of Object.keys(obj)) {
        const v = obj[k];
        if (typeof v === 'string' && v.trim().length > 0) return v;
        if (typeof v === 'object') {
          const nested = tryExtractCodeFromObject(v);
          if (nested) return nested;
        }
      }
      return null;
    }

    function handleScannedCode(rawResult) {
      stopScanner();

      console.log('QR raw result:', rawResult);

      // rawResult may be string or object depending on library and QR content
      let codeStr = '';

      if (rawResult === null || rawResult === undefined) {
        codeStr = '';
      } else if (typeof rawResult === 'string') {
        codeStr = rawResult;
      } else if (typeof rawResult === 'object') {
        // QrScanner sometimes returns an object with .data or .text
        codeStr = rawResult.data || rawResult.text || '';
        if (!codeStr) {
          // try to extract from object fields
          const extracted = tryExtractCodeFromObject(rawResult);
          if (extracted) codeStr = extracted;
        }
        if (!codeStr) {
          // fallback to JSON string for debug
          try { codeStr = JSON.stringify(rawResult); } catch (e) { codeStr = String(rawResult); }
        }
      } else {
        codeStr = String(rawResult);
      }

      codeStr = String(codeStr).trim();

      // If codeStr looks like a URL, try to extract last path segment or query param 'code','id','ma'
      let possibleCodes = [codeStr];
      try {
        if (codeStr.startsWith('http://') || codeStr.startsWith('https://')) {
          try {
            const u = new URL(codeStr);
            // try common query params
            const qCandidates = ['code','id','ma','device','deviceId','serial'];
            for (const q of qCandidates) {
              if (u.searchParams.has(q)) {
                possibleCodes.unshift(u.searchParams.get(q));
              }
            }
            // last path segment
            const parts = u.pathname.split('/').filter(Boolean);
            if (parts.length) possibleCodes.unshift(parts[parts.length - 1]);
          } catch (e) { /* ignore */ }
        }
      } catch (e) { /* ignore */ }

      // If codeStr is JSON, try parse and extract fields
      try {
        if ((codeStr.startsWith('{') && codeStr.endsWith('}')) || (codeStr.startsWith('[') && codeStr.endsWith(']'))) {
          const parsed = JSON.parse(codeStr);
          const extracted = tryExtractCodeFromObject(parsed);
          if (extracted) possibleCodes.unshift(extracted);
        }
      } catch (e) { /* ignore */ }

      // Add decoded URI variant and normalized variants
      const expanded = [];
      for (const p of possibleCodes) {
        if (!p) continue;
        expanded.push(p);
        expanded.push(decodeURIComponentSafe(p));
        expanded.push(p.toLowerCase());
        expanded.push(p.toUpperCase());
        expanded.push(normalizeKey(p));
      }

      // Remove duplicates while preserving order
      const seen = new Set();
      const candidates = [];
      for (const s of expanded) {
        if (!s) continue;
        const key = String(s);
        if (!seen.has(key)) {
          seen.add(key);
          candidates.push(key);
        }
      }

      // Display scanned raw for user
      lookupResult.innerHTML = `<div>Quét được: <strong>${escapeHtml(codeStr)}</strong></div>`;

      // Try to find match in deviceData
      let foundKey = null;
      for (const cand of candidates) {
        // direct match
        if (deviceData.hasOwnProperty(cand)) { foundKey = cand; break; }
        // case-insensitive match
        for (const k of Object.keys(deviceData)) {
          if (String(k).toLowerCase() === String(cand).toLowerCase()) { foundKey = k; break; }
        }
        if (foundKey) break;
        // normalized match
        const n = normalizeKey(cand);
        if (n && normalizedIndex[n]) { foundKey = normalizedIndex[n]; break; }
      }

      if (foundKey) {
        renderDeviceTable(foundKey, deviceData[foundKey]);
      } else {
        tableContainer.innerHTML = `
          <div class="not-found">
            Mã <strong>${escapeHtml(codeStr)}</strong> không tồn tại trong dữ liệu.
            <div class="small" style="margin-top:6px;color:#475569">
              Thử bấm "Làm mới" để cập nhật dữ liệu hoặc kiểm tra mã QR (có thể chứa JSON/URL).
            </div>
            <details style="margin-top:8px;color:#475569">
              <summary class="small">Chi tiết quét (debug)</summary>
              <pre style="white-space:pre-wrap;word-break:break-word">${escapeHtml(String(codeStr))}</pre>
            </details>
          </div>`;
      }
    }

    refreshBtn.addEventListener('click', () => {
      refreshData();
    });

    scanBtn.addEventListener('click', () => {
      startScanner();
    });

    closeScan.addEventListener('click', () => {
      stopScanner();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') stopScanner();
    });

    (function init() {
      loadFromLocal();
      if (Object.keys(deviceData).length === 0) {
        refreshData();
      }
    })();
  </script>
</body>
</html>
